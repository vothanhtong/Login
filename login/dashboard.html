<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            width: 40px;
            height: 40px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            margin-bottom: 16px;
        }

        .card-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-desc {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .welcome-section {
            text-align: left;
            margin-bottom: 40px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #3b82f6;
            font-weight: 500;
            margin-top: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        .action-bar {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(59, 130, 246, 0.1);
            display: flex;
            justify-content: flex-end;
        }
    </style>
</head>

<body>
    <div class="neural-background">
        <div class="neural-node"></div>
        <div class="neural-node"></div>
        <div class="neural-node"></div>
        <div class="neural-node"></div>
        <div class="neural-node"></div>
    </div>

    <div class="login-container" style="max-width: 900px;">
        <div class="login-card">
            <div class="ai-glow"></div>

            <div class="welcome-section">
                <div class="ai-logo" style="justify-content: flex-start;">
                    <div class="logo-core">
                        <img src="assets/logo1.jpeg" alt="logo">
                    </div>
                </div>
                <h1
                    style="text-align: left; font-size: 2.5rem; color: #ffffff; text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);">
                    Hello, <span id="userName" style="color: #3b82f6;">User</span></h1>
                <div class="user-badge">
                    <div class="status-dot"></div>
                    <span>Dashboad</span>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="stat-card">
                    <div class="card-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="4"></circle>
                            <path d="M20 8v6M23 11h-6"></path>
                        </svg>
                    </div>
                    <div class="card-title">Account Info</div>
                    <div class="card-desc">Quản lý thông tin cá nhân và cấu hình tài khoản của bạn.</div>
                </div>

                <div class="stat-card">
                    <div class="card-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
                        </svg>
                    </div>
                    <div class="card-title">Settings</div>
                    <div class="card-desc">Tùy chỉnh các thông số và giao diện người dùng.</div>
                </div>
            </div>

            <div class="action-bar">
                <button class="logout-btn" id="logoutBtn" style="margin-top: 0;">Logout</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const email = localStorage.getItem('userEmail');

            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            // Lấy phần đầu của email làm tên
            const name = email ? email.split('@')[0] : 'User';
            document.getElementById('userName').textContent = name;

            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.clear();
                window.location.href = 'index.html';
            });
        });
    </script>
</body>

</html>
